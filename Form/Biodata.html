<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata</title>
</head>
<body>
    <h1>Biodata</h1>
    <form>
        <label for ="name">Name</label>
        <input type="text" name="name" id="name" value=""/><br>

        <label for ="address">Address</label>
        <input type="text" name="address" id="address" value=""/><br>

         <label for="gender">Gender</label><br>
     <input type="radio" name="gender" id="male">Male<br>
     <input type="radio" name="gender" id="female">Female<br>

     <label for="dob">DOB</label>
         <input type="date" name=" " id="" placeholder=""/><br>

        <label> Email address</label>
        <input type="text" name="email" id="email" placeholder="" value="@gmail.com"/><br>

        <label for="mobno">Mobno</label>
        <input type="number" name="number" id="number" placeholder="mobno" value=""><br>
        
        <label for="graduation">Graduation</label><br>
        <input type="checkbox" name="ug" id="ug">UG<br>
        <input type="checkbox" name="pg" id="pg">PG<br>
        <input type="checkbox" name="others" id="others">others<br>
     <input type="text" name="" id=""><br>

    <label for="Place">Place</label>
     <select>
        <option value="ooty">Ooty</option>
        <option value="coimbatore">Coimbatore</option>
        <option value="trichy">Trichy</option>
        <option value="Selam">selam</option>
        <option value="Bangalore">Bangalore</option>
        <option value="chennai">Chennai</option>
        <option value="other">Other</option>
     </select><br><br>

     <button>Submit</button>
     <button>clear</button>
    </form>

    <!-- svg -->
    <h1>Scalable Vector graphics</h1>

    <svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
  <rect width="10" height="10">
    <animate
      attributeName="rx"
      values="0;5;0"
      dur="10s"
      repeatCount="indefinite" />
  </rect>
</svg>
<!-- svg -->
    </body>
    </html>
