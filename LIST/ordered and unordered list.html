<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruits</title>
</head>
<body>
    <h1>Citrus fruits</h1>
    <li>Orange</li>
    <li>Lemon</li>
    <h1>Berries</h1>
    <ol type="A">
        <!-- default type=123 -->
        <li>Blackberry</li>
        <li>Blue berry</li>
        <li>Strawberry</li>
    </ol>
    <h1>Seasonal fruits</h1>
    <ul type="square">
        <!-- default type= bullet points -->
        <li>Mango</li>
        <li>Watermelon</li>
    </ul>
    
</body>
</html>
