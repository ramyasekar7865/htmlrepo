<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Table</title>
</head>
<body>
    <h1>Class Time Table</h1>
    <table border="5">
        <!-- border should be 0-5 -->
        <th>Empno</th>
        <!-- th=table heading (column) -->
        <th>Role</th>
        <th>Location</th>
        <tr>
            <!-- tr= table row -->
            <td>101</td>
            <!-- td= table data that is cell -->
            <td>software engineer</td>
            <td rowspan="2">Chennai</td>
            <!-- rowspan=vertical (111)
             colspan=horizondal (-----) -->
        </tr>
        <tr>
            <td>105</td>
            <td>software engineeer</td>
        </tr>
        <tr>
            <td>102</td>
            <td>software tester</td>
            <td>Coimbatore</td>
        </tr>
        <tr>
            <td>103</td>
            <td>software developer</td>
            <td>kochi</td>
        </tr>
        <tr>
            <td colspan="2">104</td>
            
            <td>bangalore</td>
        </tr>
    </table>
</body>
</html>
